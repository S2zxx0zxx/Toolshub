name = "toolshub-api-worker"
main = "src/index.js"
compatibility_date = "2024-03-20"

# Secret variable GROQ_API_KEY will be provided via `npx wrangler secret put GROQ_API_KEY`

[[vectorize]]
binding = "VECTORIZE"
index_name = "toolshub-knowledge"

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
